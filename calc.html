<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #333;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .display {
            background-color: #222;
            color: white;
            font-size: 2em;
            padding: 20px;
            text-align: right;
            border-radius: 5px;
            margin-bottom: 20px;
            height: 80px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            background-color: #666;
            border: none;
            color: white;
            padding: 20px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #999;
        }

        .operator {
            background-color: #ff9500;
        }

        .operator:hover {
            background-color: #ffaa33;
        }

        .equals {
            background-color: #007AFF;
        }

        .equals:hover {
            background-color: #0066CC;
        }

        .clear {
            background-color: #ff3b30;
        }

        .clear:hover {
            background-color: #ff4444;
        }

        .span-2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">0</div>
        <div class="buttons">
            <button class="clear span-2">C</button>
            <button class="operator">&divide;</button>
            <button class="operator">&times;</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">-</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">+</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equals">=</button>
            
            <button class="span-2">0</button>
            <button>.</button>
            <button class="operator">%</button>
        </div>
    </div>
</body>
</html>
